<div class="dropdown-multiselect position-relative">
  <div
    class="form-select bg-body d-flex align-items-center"
    (click)="toggleDropdown()"
    tabindex="0"
    role="button"
    aria-haspopup="listbox"
    [attr.aria-expanded]="dropdownOpen"
  >
    <span class="flex-grow-1 text-truncate">
      {{ selectionLabel }}
    </span>
    <span class="ms-2"><i class="bi bi-caret-down-fill"></i></span>
  </div>
  <div class="dropdown-menu w-100 mt-1 show" *ngIf="dropdownOpen">
    <div
      class="dropdown-item d-flex justify-content-between align-items-center"
      *ngFor="let airport of airports"
      (click)="$event.stopPropagation()"
    >
      <span>{{ airport.icao }}</span>
      <c-form-check [inline]="true" class="mb-0 ms-2">
        <input
          cFormCheckInput
          type="checkbox"
          [checked]="isSelected(airport.icao)"
          (change)="toggleIcao(airport.icao)"
          style="border-color: #8a93a2;"
        />
      </c-form-check>
    </div>
    <div class="dropdown-empty" *ngIf="airports.length === 0">
      No airports configured
    </div>
  </div>
</div>
